name: math_view
description: Flutter math rendering widget powered by katex-rs.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge:
    path: ../flutter-rust-bridge/frb_dart
  freezed_annotation: ^3.0.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  build_runner: ^2.4.0
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

  fonts:
    - family: KaTeX_Main
      fonts:
        - asset: fonts/KaTeX_Main-Regular.ttf
        - asset: fonts/KaTeX_Main-Bold.ttf
          weight: 700
        - asset: fonts/KaTeX_Main-Italic.ttf
          style: italic
        - asset: fonts/KaTeX_Main-BoldItalic.ttf
          weight: 700
          style: italic
    - family: KaTeX_Math
      fonts:
        - asset: fonts/KaTeX_Math-Italic.ttf
          style: italic
        - asset: fonts/KaTeX_Math-BoldItalic.ttf
          weight: 700
          style: italic
    - family: KaTeX_AMS
      fonts:
        - asset: fonts/KaTeX_AMS-Regular.ttf
    - family: KaTeX_Size1
      fonts:
        - asset: fonts/KaTeX_Size1-Regular.ttf
    - family: KaTeX_Size2
      fonts:
        - asset: fonts/KaTeX_Size2-Regular.ttf
    - family: KaTeX_Size3
      fonts:
        - asset: fonts/KaTeX_Size3-Regular.ttf
    - family: KaTeX_Size4
      fonts:
        - asset: fonts/KaTeX_Size4-Regular.ttf
    - family: KaTeX_Caligraphic
      fonts:
        - asset: fonts/KaTeX_Caligraphic-Regular.ttf
        - asset: fonts/KaTeX_Caligraphic-Bold.ttf
          weight: 700
    - family: KaTeX_Fraktur
      fonts:
        - asset: fonts/KaTeX_Fraktur-Regular.ttf
        - asset: fonts/KaTeX_Fraktur-Bold.ttf
          weight: 700
    - family: KaTeX_SansSerif
      fonts:
        - asset: fonts/KaTeX_SansSerif-Regular.ttf
        - asset: fonts/KaTeX_SansSerif-Bold.ttf
          weight: 700
        - asset: fonts/KaTeX_SansSerif-Italic.ttf
          style: italic
    - family: KaTeX_Script
      fonts:
        - asset: fonts/KaTeX_Script-Regular.ttf
    - family: KaTeX_Typewriter
      fonts:
        - asset: fonts/KaTeX_Typewriter-Regular.ttf
